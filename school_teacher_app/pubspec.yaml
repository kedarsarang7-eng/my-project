name: school_teacher_app
description: DukanX School ERP — Teacher & Staff Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  dio: ^5.7.0
  amazon_cognito_identity_dart_2: ^4.0.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  uuid: ^4.5.2
  fl_chart: ^1.1.1
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  google_fonts: ^8.0.0
  flutter_dotenv: ^6.0.0
  percent_indicator: ^4.2.3

  # Unified Notification System (UNS) shared client + UI widgets.
  # Wired by task 14.6 of `unified-notification-system` spec.
  notifications_sdk:
    path: ../packages/notifications-sdk
  notifications_ui:
    path: ../packages/notifications-ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
