name: saas_platform
description: Multi-tenant SaaS platform Flutter app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  dio: ^5.3.3
  amazon_cognito_identity_dart_2: ^3.7.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  fluttertoast: ^8.2.4
  intl: ^0.20.2
  uuid: ^4.2.1
  fl_chart: ^0.66.0
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.3.1

  # QR Payment & WebSocket (CRITICAL - Added May 2026)
  wakelock_plus: ^1.2.0      # Keep screen on during QR display
  qr_flutter: ^4.1.0        # Display QR codes
  web_socket_channel: ^2.4.0 # WebSocket for real-time payments
  shimmer: ^3.0.0            # Loading skeletons
  
  # Camera + ML Kit for ID card scanning
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.14.0
  vibration: ^3.0.0

  # Functional programming (Either/Option used in domain layer)
  dartz: ^0.10.1

  # Environment config
  flutter_dotenv: ^5.2.1

  # Google Fonts for typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true