name: DukanX Customer App — Release

on:
  push:
    tags:
      - 'customer-v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'
  JAVA_VERSION: '17'
  WORKING_DIRECTORY: dukan_customer_app

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. Static analysis + tests
  # ────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

  # ────────────────────────────────────────────────────────────────
  # 2. Build Android APK
  # ────────────────────────────────────────────────────────────────
  build_apk:
    name: Build APK
    needs: analyze
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type == 'apk' || github.event_name == 'push'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Write .env
        run: |
          echo "API_BASE_URL=${{ secrets.CUSTOMER_API_BASE_URL }}" >> .env
          echo "COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}" >> .env
          echo "COGNITO_MOBILE_CLIENT_ID=${{ secrets.COGNITO_MOBILE_CLIENT_ID }}" >> .env
          echo "WS_URL=${{ secrets.CUSTOMER_WS_URL }}" >> .env
          echo "ENVIRONMENT=prod" >> .env

      - name: Decode keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/release.keystore

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          KEYSTORE_PATH: keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: customer-app-apk-${{ github.sha }}
          path: ${{ env.WORKING_DIRECTORY }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  # ────────────────────────────────────────────────────────────────
  # 3. Build Android App Bundle (for Play Store)
  # ────────────────────────────────────────────────────────────────
  build_aab:
    name: Build AAB (Play Store)
    needs: analyze
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type == 'aab' || startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Write .env
        run: |
          echo "API_BASE_URL=${{ secrets.CUSTOMER_API_BASE_URL }}" >> .env
          echo "COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}" >> .env
          echo "COGNITO_MOBILE_CLIENT_ID=${{ secrets.COGNITO_MOBILE_CLIENT_ID }}" >> .env
          echo "WS_URL=${{ secrets.CUSTOMER_WS_URL }}" >> .env
          echo "ENVIRONMENT=prod" >> .env

      - name: Decode keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/release.keystore

      - name: Get dependencies
        run: flutter pub get

      - name: Build release AAB
        env:
          KEYSTORE_PATH: keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-app-aab-${{ github.sha }}
          path: ${{ env.WORKING_DIRECTORY }}/build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ────────────────────────────────────────────────────────────────
  # 4. Create GitHub Release on tag push
  # ────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build_apk, build_aab]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: customer-app-apk-${{ github.sha }}
          path: artifacts/apk

      - name: Download AAB artifacts
        uses: actions/download-artifact@v4
        with:
          name: customer-app-aab-${{ github.sha }}
          path: artifacts/aab

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DukanX Customer App ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/apk/*.apk
            artifacts/aab/*.aab
