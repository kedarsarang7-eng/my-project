name: dukanx_customer
description: DukanX — My Account. Customer-facing app for viewing invoices, dues, ledger, and payments.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Shared package (models, widgets, auth utilities)
  dukanx_shared:
    path: ../packages/dukanx_shared

  cupertino_icons: ^1.0.6

  # Firebase — FCM push notifications only
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Toasts
  fluttertoast: ^9.0.0

  # Dependency Injection
  get_it: ^9.2.0

  # Localization & formatting
  intl: ^0.20.2

  # PDF generation & printing (invoice viewer)
  pdf: ^3.11.3
  printing: ^5.14.2

  # Local storage — preferences only (NO tokens here)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # Utilities
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  path_provider: ^2.1.5

  # Code generation - Freezed models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3

  # Security
  local_auth: ^3.0.0
  package_info_plus: ^10.1.0
  crypto: ^3.0.7
  http: ^1.6.0
  http_parser: 4.1.2

  # Media & UI
  cached_network_image: ^3.4.0
  flutter_cache_manager: ^3.3.0
  fl_chart: ^1.1.1
  flutter_svg: ^2.1.0
  google_fonts: ^8.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Marketplace
  mobile_scanner: ^7.2.0
  badges: ^3.1.0

  # Architecture & State
  flutter_riverpod: ^2.5.1
  go_router: ^17.2.3
  equatable: ^2.0.7
  collection: ^1.19.1
  uuid: ^4.5.2
  decimal: ^3.2.4

  # Auth — Cognito SRP
  amazon_cognito_identity_dart_2: ^4.0.0

  # Sharing
  share_plus: ^13.1.0

  # QR display (for payment QR + exit QR)
  qr_flutter: ^4.1.0

  # Payment gateway
  razorpay_flutter: ^1.3.6

  # Real-time
  web_socket_channel: ^3.0.3

  # Platform
  device_info_plus: ^13.1.0
  app_links: ^7.0.0
  permission_handler: ^12.0.1
  flutter_dotenv: ^6.0.0
  rxdart: ^0.28.0

  # Root/jailbreak detection
  flutter_jailbreak_detection: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.6
  build_runner: ^2.4.15
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/logo.png
    - .env