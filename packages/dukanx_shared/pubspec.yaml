name: dukanx_shared
description: Shared models, widgets, network utilities, and auth helpers for DukanX apps.
publish_to: 'none'

version: 1.0.0

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Formatting
  intl: ^0.20.2

  # Secure storage for tokens
  flutter_secure_storage: ^10.0.0

  # HTTP
  http: ^1.6.0

  # State
  flutter_riverpod: ^2.5.1
  equatable: ^2.0.7

  # Utils
  uuid: ^4.5.2
  decimal: ^3.2.4
  collection: ^1.19.1
  crypto: ^3.0.7

  # UI
  google_fonts: ^8.0.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # Auth
  amazon_cognito_identity_dart_2: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
