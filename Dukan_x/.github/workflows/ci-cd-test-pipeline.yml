# ============================================================================
# CI/CD Testing Pipeline — DukanX Full Quality Gate
# Disciplines: Unit → Widget → Integration → API → E2E → Security → Load
# Triggers: PR to main/develop, push to main, manual dispatch
# ============================================================================

name: DukanX CI/CD Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_load_tests:
        description: 'Run k6 load tests'
        required: false
        default: 'false'
        type: boolean
      run_e2e_live:
        description: 'Run E2E against live staging stack'
        required: false
        default: 'false'
        type: boolean

# ── Environment ───────────────────────────────────────────────────────────────
env:
  NODE_VERSION: '20.x'
  FLUTTER_VERSION: '3.22.0'
  AWS_REGION: us-east-1

# ============================================================================
# JOB 1: LINT & STATIC ANALYSIS
# ============================================================================
jobs:
  lint:
    name: '🔍 Lint & Static Analysis'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Install backend deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: Dukan_x/my-backend

      - name: ESLint
        run: npx eslint src/ --ext .ts --max-warnings 0
        working-directory: Dukan_x/my-backend
        continue-on-error: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: Dukan_x

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        working-directory: Dukan_x

# ============================================================================
# JOB 2: BACKEND UNIT TESTS
# ============================================================================
  unit-tests:
    name: '🧪 Backend Unit Tests'
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Install deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: Run Unit Tests with coverage
        run: npx jest --testPathPattern="(business-capability-registry|invoice-calculation-engine|inventory-logic|auth-token-logic|specialized-business-logic|jwt-role|revision-history)" --coverage --coverageReporters=json-summary,lcov,text
        working-directory: Dukan_x/my-backend
        env:
          NODE_ENV: test
          AWS_REGION: us-east-1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: Dukan_x/my-backend/coverage/lcov.info
          flags: backend-unit
          fail_ci_if_error: false

      - name: Coverage threshold check (80% lines)
        run: |
          LINES=$(cat coverage/coverage-summary.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.total.lines.pct)")
          echo "Line coverage: $LINES%"
          node -e "if ($LINES < 80) { console.error('Coverage below 80%'); process.exit(1); }"
        working-directory: Dukan_x/my-backend

# ============================================================================
# JOB 3: BUSINESS CAPABILITY REGISTRY TESTS
# ============================================================================
  capability-registry-tests:
    name: '🏪 Business Capability Registry Tests'
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Install deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: Run capability registry tests (all 17 business types)
        run: npx jest --testPathPattern="business-capability-registry" --verbose
        working-directory: Dukan_x/my-backend
        env:
          NODE_ENV: test

# ============================================================================
# JOB 4: SECURITY TESTS
# ============================================================================
  security-tests:
    name: '🔒 Security & Pen Tests'
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Install deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: Run security tests
        run: npx jest --testPathPattern="(security-pentest|tenant-isolation|auth-rbac-mapping)" --verbose
        working-directory: Dukan_x/my-backend
        env:
          NODE_ENV: test

      - name: npm audit (critical/high vulns fail)
        run: npm audit --audit-level=high
        working-directory: Dukan_x/my-backend
        continue-on-error: false

# ============================================================================
# JOB 5: FLUTTER WIDGET TESTS
# ============================================================================
  flutter-widget-tests:
    name: '🎨 Flutter Widget Tests'
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: Dukan_x

      - name: Run widget tests
        run: flutter test test/widget/ --coverage
        working-directory: Dukan_x

      - name: Upload Flutter coverage
        uses: codecov/codecov-action@v4
        with:
          files: Dukan_x/coverage/lcov.info
          flags: flutter-widget
          fail_ci_if_error: false

# ============================================================================
# JOB 6: INTEGRATION TESTS
# ============================================================================
  integration-tests:
    name: '🔗 Integration Tests'
    runs-on: ubuntu-latest
    needs: [unit-tests, security-tests]
    timeout-minutes: 20
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:2.3.0
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Install deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8000 && break || sleep 1
          done

      - name: Create DynamoDB Local test table
        run: |
          aws dynamodb create-table \
            --table-name DukanX-Table \
            --attribute-definitions \
              AttributeName=PK,AttributeType=S \
              AttributeName=SK,AttributeType=S \
            --key-schema \
              AttributeName=PK,KeyType=HASH \
              AttributeName=SK,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:8000
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_REGION: us-east-1

      - name: Run integration tests
        run: npx jest --testPathPattern="(integration-auth-pipeline|feature-gating-integration|plan-feature-guard)" --verbose
        working-directory: Dukan_x/my-backend
        env:
          NODE_ENV: test
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_REGION: us-east-1

# ============================================================================
# JOB 7: E2E WORKFLOW TESTS
# ============================================================================
  e2e-workflow-tests:
    name: '🔄 E2E Workflow Tests (in-process)'
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Install deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: Run E2E workflow tests
        run: npx jest --testPathPattern="e2e-business-workflows" --verbose --forceExit
        working-directory: Dukan_x/my-backend
        env:
          NODE_ENV: test

# ============================================================================
# JOB 8: REGRESSION TESTS
# ============================================================================
  regression-tests:
    name: '🛡️ Regression Tests'
    runs-on: ubuntu-latest
    needs: [unit-tests, capability-registry-tests]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Install deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: Run regression suite
        run: npx jest --testPathPattern="regression-suite" --verbose
        working-directory: Dukan_x/my-backend
        env:
          NODE_ENV: test

# ============================================================================
# JOB 9: DYNAMODB PERFORMANCE TESTS
# ============================================================================
  db-performance-tests:
    name: '⚡ DynamoDB Performance Tests'
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Install deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: Run DB performance tests
        run: npx jest --testPathPattern="dynamodb-performance" --verbose
        working-directory: Dukan_x/my-backend
        env:
          NODE_ENV: test

# ============================================================================
# JOB 10: FULL TEST SUITE (pre-merge gate)
# ============================================================================
  full-test-suite:
    name: '✅ Full Test Suite (pre-merge gate)'
    runs-on: ubuntu-latest
    needs: [unit-tests, capability-registry-tests, security-tests, flutter-widget-tests, integration-tests, e2e-workflow-tests, regression-tests, db-performance-tests]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Install deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: Run ALL backend tests
        run: npx jest --coverage --coverageReporters=text-summary --forceExit
        working-directory: Dukan_x/my-backend
        env:
          NODE_ENV: test

      - name: Final coverage gate (≥80%)
        run: |
          npx jest --coverage --coverageReporters=json-summary --forceExit 2>/dev/null || true
          LINES=$(cat coverage/coverage-summary.json | node -e "
            const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log(d.total.lines.pct)
          ")
          echo "Final line coverage: $LINES%"
          node -e "if (parseFloat('$LINES') < 80) { console.error('GATE FAILED: Coverage below 80%'); process.exit(1); }"
        working-directory: Dukan_x/my-backend

# ============================================================================
# JOB 11: LOAD TESTS (manual trigger only)
# ============================================================================
  load-tests:
    name: '📈 k6 Load Tests'
    runs-on: ubuntu-latest
    if: github.event.inputs.run_load_tests == 'true'
    needs: full-test-suite
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run baseline load test
        run: k6 run tests/k6-load-test.js --env SCENARIO=baseline --env BASE_URL=${{ secrets.STAGING_API_URL }} --env JWT_TOKEN=${{ secrets.LOAD_TEST_JWT }}
        working-directory: Dukan_x/my-backend
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

# ============================================================================
# JOB 12: DEPLOY TO STAGING (on main merge)
# ============================================================================
  deploy-staging:
    name: '🚀 Deploy to Staging'
    runs-on: ubuntu-latest
    needs: full-test-suite
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    environment:
      name: staging
      url: https://staging.dukanx.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Dukan_x/my-backend/package-lock.json'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install deps
        run: npm ci
        working-directory: Dukan_x/my-backend

      - name: Deploy to staging
        run: npx serverless deploy --stage staging --verbose
        working-directory: Dukan_x/my-backend
        env:
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Smoke test staging deployment
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.STAGING_API_URL }}/health)
          echo "Staging health: $STATUS"
          test "$STATUS" = "200"
