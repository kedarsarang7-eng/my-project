name: Deploy Serverless Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'my-backend/**'
      - '.github/workflows/deploy-serverless.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: '24.x'

jobs:
  deploy:
    name: Build & Deploy via Serverless
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: my-backend/package-lock.json

      # ✅ OIDC Authentication with AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActions-Serverless-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Dependencies
        working-directory: ./my-backend
        run: npm ci

      - name: Compile TypeScript
        working-directory: ./my-backend
        run: npm run build

      - name: Install Serverless Framework
        run: npm install -g serverless@4

      - name: Deploy to AWS
        working-directory: ./my-backend
        run: serverless deploy --stage production --region ${{ env.AWS_REGION }}
