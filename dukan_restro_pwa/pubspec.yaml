name: dukan_restro_pwa
description: DukanX Restaurant Customer PWA

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: 2.6.1
  go_router: 13.2.5
  equatable: 2.0.5
  uuid: ^4.5.3
  intl: 0.19.0
  # google_fonts removed — dart2js const evaluation bug in v6.2.1 on web builds
  # Use ThemeData textTheme instead for PWA
  http: ^1.2.2
  hive_flutter: 1.1.0
  connectivity_plus: 6.0.5
  riverpod_annotation: 2.3.5
  amazon_cognito_identity_dart_2: 3.8.1
  flutter_secure_storage: 10.0.0
  web_socket_channel: 3.0.3
  razorpay_flutter: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.0
  build_runner: 2.5.4
  riverpod_generator: 2.6.5

flutter:
  uses-material-design: true
