name: school_admin_app
description: DukanX School ERP — Admin Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  dio: ^5.3.3
  amazon_cognito_identity_dart_2: ^3.7.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  uuid: ^4.2.1
  fl_chart: ^0.66.0
  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.2.1
  percent_indicator: ^4.2.3

  # Unified Notification System (UNS) shared client + UI widgets.
  # Wired by task 14.6 of `unified-notification-system` spec.
  notifications_sdk:
    path: ../packages/notifications-sdk
  notifications_ui:
    path: ../packages/notifications-ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
