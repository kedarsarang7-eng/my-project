  # ══════════════════════════════════════════════════════════════════════
  # PAYMENT GATEWAY (Multi-Tenant, Gateway-Agnostic)
  # ══════════════════════════════════════════════════════════════════════

  # ── Payment Config (Merchant Onboarding) ──────────────────────────────
  paymentConfigSave:
    handler: dist/handlers/payment-config.saveConfig
    events:
      - httpApi:
          path: /payment-config
          method: POST
    description: Save KMS-encrypted gateway credentials for tenant

  paymentConfigGet:
    handler: dist/handlers/payment-config.getConfigs
    events:
      - httpApi:
          path: /payment-config
          method: GET
    description: List gateway configs (status only, no secrets)

  paymentConfigVerify:
    handler: dist/handlers/payment-config.verifyConfig
    events:
      - httpApi:
          path: /payment-config/verify
          method: POST
    description: Verify and activate gateway credentials

  # ══════════════════════════════════════════════════════════════════════
  # AUTONOMOUS BUSINESS AGENT
  # ══════════════════════════════════════════════════════════════════════
  
  autonomousHourly:
    handler: dist/handlers/autonomous.hourlyTrigger
    onError: !GetAtt AsyncDLQ.Arn
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true
    description: Hourly proactive AI agent analysis (Inventory/Fraud)

  autonomousDaily:
    handler: dist/handlers/autonomous.dailyTrigger
    onError: !GetAtt AsyncDLQ.Arn
    events:
      - schedule:
          rate: cron(0 18 * * ? *) # Runs at ~11:30 PM IST (UTC +5:30)
          enabled: true
    description: Daily EOD AI agent tasks (Reports/Credit Reminders)

  creditReminderDaily:
    handler: dist/handlers/credit-reminders.runDailyCreditReminderJob
    onError: !GetAtt AsyncDLQ.Arn
    events:
      - schedule:
          rate: cron(30 17 * * ? *) # ~11:00 PM IST daily
          enabled: true
    description: Daily automatic udhar/credit reminder fanout (p20)

  autonomousWeekly:
    handler: dist/handlers/autonomous.weeklyTrigger
    onError: !GetAtt AsyncDLQ.Arn
    events:
      - schedule:
          rate: cron(0 18 ? * SUN *) # Runs every Sunday at ~11:30 PM IST
          enabled: true
    description: Weekly AI Strategy Agent planning and optimizations

  secretRotation:
    handler: dist/handlers/secret-rotation.rotateInternalSecret
    events:
      - schedule:
          rate: rate(30 days)
          enabled: true
    environment:
      INTERNAL_SECRET_ARN: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:DukanXInternalAPISecret-*'
    description: Automated rotation of the INTERNAL_API_SECRET for service-to-service auth

  aiEventProcessor:
    handler: dist/handlers/ai-event-processor.handleEvent
    onError: !GetAtt AsyncDLQ.Arn
    events:
      - eventBridge:
          eventBus: default
          pattern:
            source:
              - prefix: "dukanx."
            detail-type:
              - "WSBroadcast"
    description: Background AI Processor for business events (Sales, Inventory, etc)

  paymentConfigDelete:
    handler: dist/handlers/payment-config.deleteConfig
    events:
      - httpApi:
          path: /payment-config/{gateway}
          method: DELETE
    description: Remove gateway config for tenant

  # ── Payment Initiation (QR Generation) ────────────────────────────────
  initiatePayment:
    handler: dist/handlers/payment.initiatePayment
    events:
      - httpApi:
          path: /payment/initiate
          method: POST
    description: Create payment order and generate QR code

  getPaymentStatus:
    handler: dist/handlers/payment.getPaymentStatus
    events:
      - httpApi:
          path: /payment/status
          method: GET
      - httpApi:
          path: /payment/status/{orderId}
          method: GET
    description: Check payment order status

  reconcilePayments:
    handler: dist/handlers/payment.reconcilePayments
    events:
      - httpApi:
          path: /payment/reconcile
          method: POST
    description: Cron job to sync pending payments with gateway

  # ── Payment Webhooks (Unauthenticated — gateway callbacks) ────────────
  # PERF-2 FIX: Reserved concurrency — guaranteed capacity at $0 cost.
  # Cold start mitigated by arm64 + 512MB + lazy SDK (~300-400ms, well within gateway retry window).
  phonePeWebhook:
    handler: dist/handlers/payment-webhook.phonePeWebhook
    memorySize: 512          # PERF-16 FIX: More CPU for faster crypto verification
    reservedConcurrency: 10  # PERF-2 FIX: Guaranteed capacity, prevents noisy-neighbor exhaustion
    events:
      - httpApi:
          path: /payment/webhook/phonepe
          method: POST
          authorizer:
            name: none
    description: PhonePe Webhook endpoint

  razorpayWebhook:
    handler: dist/handlers/payment-webhook.razorpayWebhook
    memorySize: 512          # PERF-16 FIX: More CPU for faster crypto verification
    reservedConcurrency: 10  # PERF-2 FIX: Guaranteed capacity
    events:
      - httpApi:
          path: /payment/webhook/razorpay
          method: POST
          authorizer:
            name: none
    description: Razorpay Webhook endpoint

  # ── RAZORPAY AUDIT FIX: Operator App Payment Security ─────────────────────
  # P0-1 + P0-2: Server-side verification + per-tenant key isolation
  createPaymentOrder:
    handler: dist/handlers/payment/create-order.handler
    memorySize: 512
    events:
      - httpApi:
          path: /billing/payment/create-order
          method: POST
    description: Create Razorpay order with per-tenant credentials (returns merchant key)

  verifyPayment:
    handler: dist/handlers/payment/verify-payment.handler
    memorySize: 512
    events:
      - httpApi:
          path: /billing/payment/verify
          method: POST
    description: Server-side payment verification before marking bill paid

  processRefund:
    handler: dist/handlers/payment/process-refund.handler
    memorySize: 512
    events:
      - httpApi:
          path: /billing/payment/refund
          method: POST
    description: Process full or partial refunds for paid bills (Admin/Manager only)

  getRefunds:
    handler: dist/handlers/payment/get-refunds.handler
    memorySize: 256
    events:
      - httpApi:
          path: /billing/payment/refunds
          method: GET
    description: Fetch refund history for a bill or business

  # ── Payment Analytics ──────────────────────────────────────────────────
  paymentAnalytics:
    handler: dist/handlers/analytics/payment-analytics.handler
    memorySize: 512
    timeout: 15
    events:
      - httpApi:
          path: /analytics/payments
          method: GET
      - httpApi:
          path: /analytics/payments/today
