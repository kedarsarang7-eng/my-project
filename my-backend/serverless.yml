# ============================================================================
# DukanX — Serverless Framework Configuration
# ============================================================================
# Multi-Tenant SaaS Backend for 14 Business Types
# Fully Serverless: Lambda + DynamoDB + API Gateway + Cognito + S3
# Cost at zero traffic: $0.00/mo
# ============================================================================

service: my-backend

frameworkVersion: '4'

# ============================================================================
# PROVIDER
# ============================================================================
provider:
  name: aws
  runtime: nodejs24.x
  architecture: arm64       # PERF-8 FIX: Graviton3 — ~30% faster cold start, ~20% cheaper
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'ap-south-1'}
  memorySize: 256          # 256MB — default for non-critical paths
  timeout: 10              # 10s — plenty for API calls
  logRetentionInDays: 7    # COST-OPT: 7 days sufficient for dev (was 14)
  # COST-OPT: X-Ray tracing disabled globally to save $1-5/mo
  # Re-enable per-function on critical paths (e.g. payment handlers) when needed
  tracing:
    apiGateway: false
    lambda: false
  logs:
    httpApi:
      format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","method":"$context.httpMethod","path":"$context.path","status":"$context.status","latency":"$context.responseLatency","userAgent":"$context.identity.userAgent"}'
  deploymentBucket:
    name: dukanx-deploys-${self:provider.region}-${aws:accountId}

  # ── API Gateway (HTTP API — cheaper than REST API) ──────────────────────
  httpApi:
    # ── JWT Authorizer (Cognito — blocks unauthenticated requests before Lambda) ──
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}'
        audience:
          - !Ref CognitoUserPoolClient
          - !Ref DesktopAppClient
          - !Ref MobileAppClient
          - !Ref AdminPanelClient
    cors:
      # HIGH-005 FIX: No wildcard defaults — fail-closed CORS policy
      allowedOrigins:
        - ${env:CORS_ORIGIN_1, 'https://admin.dukanx.com'}
        - ${env:CORS_ORIGIN_2, 'https://app.dukanx.com'}
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Correlation-Id
        - X-Device-Id
        - X-Request-Signature
        - X-Request-Timestamp
        - X-Nonce
        - x-tenant-id
        - x-business-id
        - x-shop-id
        - X-Idempotency-Key


  # ── Environment Variables ───────────────────────────────────────────────
  environment:
    NODE_ENV: ${self:provider.stage}
    DYNAMODB_TABLE: !Ref DukanXTable
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
    COGNITO_DESKTOP_CLIENT_ID: !Ref DesktopAppClient
    COGNITO_MOBILE_CLIENT_ID: !Ref MobileAppClient
    COGNITO_ADMIN_CLIENT_ID: !Ref AdminPanelClient
    # COGNITO_IDENTITY_POOL_ID set after IAM stack deploy (see cf-iam-roles.yml)
    COGNITO_REGION: ${self:provider.region}
    S3_BUCKET_NAME: !Ref TenantStorageBucket
    S3_REGION: ${self:provider.region}
    PLATFORM_APPLICATION_ARN: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:app/GCM/DukanX-Customer-App'
    SECURITY_ALERT_TOPIC_ARN: !Ref SecurityAlertTopic
    # FIX (H-2): Internal service-to-service auth secret. MUST be set in
    # deployment environment or the Lambda will fail-fast on cold start.
    # Generate with: openssl rand -hex 32
    INTERNAL_API_SECRET: ${env:INTERNAL_API_SECRET}
    # Public RESTO PWA compat (/api/v1/restaurant/*) — off unless explicitly enabled
    RESTO_V1_PUBLIC_ENABLED: ${env:RESTO_V1_PUBLIC_ENABLED, 'false'}
    RESTO_V1_ORDER_SECRET: ${env:RESTO_V1_ORDER_SECRET, ''}  # legacy, deprecated
    # P0-02: HS256 secret for table-scoped scan JWTs. Generate: openssl rand -hex 32
    RESTO_SCAN_JWT_SECRET: ${env:RESTO_SCAN_JWT_SECRET, ''}
    # ── WebSocket Real-Time (cross-stack reference to dukanx-websocket stack) ──
    WEBSOCKET_CONNECTIONS_TABLE: dukanx-ws-connections-${self:provider.stage}
    WEBSOCKET_API_ENDPOINT: ${env:WEBSOCKET_API_ENDPOINT, ''}

    # ── AI Configurations ───────────────────────────────────────────────────
    DUKANX_AI_DEFAULT_PROVIDER: ${env:DUKANX_AI_DEFAULT_PROVIDER, 'ollama'}
    DUKANX_AI_API_KEY: ${env:DUKANX_AI_API_KEY, ''}

    # ── Smart Inventory Import ───────────────────────────────────────────────
    IMPORT_QUEUE_URL: !Ref ImportRowQueue
    ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY, ''}
    FUZZY_THRESHOLD: ${env:FUZZY_THRESHOLD, '0.85'}

  # ── IAM Permissions ────────────────────────────────────────────────────
  iam:
    role:
      statements:

        # DynamoDB — Main table + GSIs (Single Table Design)
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchWriteItem
            - dynamodb:BatchGetItem
            - dynamodb:TransactWriteItems   # Already used by handlers
            - dynamodb:TransactGetItems     # PERF-19 FIX: Missing permission
          Resource:
            - !GetAtt DukanXTable.Arn
            - !Sub '${DukanXTable.Arn}/index/*'


        # S3 — Tenant storage (invoices, images, reports)
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
          Resource:
            - !Join ['', ['arn:aws:s3:::', !Ref TenantStorageBucket, '/*']]
        # Cognito — User management
        - Effect: Allow
          Action:
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminUpdateUserAttributes
          Resource:
            - !GetAtt CognitoUserPool.Arn
        # SNS — Push Notifications + Security Alerts
        # FIX (L-3): Scoped from Resource: '*' to exact topic/endpoint ARNs.
        # Prevents publishing to arbitrary topics in the account.
        - Effect: Allow
          Action:
            - sns:CreatePlatformEndpoint
            - sns:DeleteEndpoint
          Resource:
            - !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:app/GCM/DukanX-Customer-App'
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            - !Ref SecurityAlertTopic
            - !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:app/GCM/DukanX-Customer-App'
            - !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:endpoint/GCM/DukanX-Customer-App/*'


        # S3 — Bucket-level listing (IAM-7 FIX: prefix-scoped to tenant paths only)
        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource:
            - !GetAtt TenantStorageBucket.Arn
          Condition:
            StringLike:
              s3:prefix:
                - 'tenants/${!cognito-identity.amazonaws.com:sub}/*'
                - 'tenants/*'  # Fallback — handler-level tenantId check still enforced

        # DynamoDB — WebSocket connections (cross-stack: dukanx-websocket)
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/dukanx-ws-connections-${self:provider.stage}'
            - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/dukanx-ws-connections-${self:provider.stage}/index/*'

        # API Gateway Management — WebSocket (cross-stack: dukanx-websocket)
        - Effect: Allow
          Action:
            - execute-api:ManageConnections
          Resource:
            - !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/${self:provider.stage}/POST/@connections/*'

        # SQS — Async DLQ (dead letter queue for failed scheduled/async Lambdas)
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource:
            - !GetAtt AsyncDLQ.Arn

        # SQS — Smart Import Row Queue (FIFO)
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:SendMessageBatch
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - !GetAtt ImportRowQueue.Arn
            - !GetAtt ImportRowDLQ.Arn

        # Textract — OCR for scanned import files
        - Effect: Allow
          Action:
            - textract:AnalyzeDocument
            - textract:DetectDocumentText
          Resource: '*'
            
        # X-Ray — Distributed Tracing
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"

        # Secrets Manager - Automated Rotation
        - Effect: Allow
          Action:
            - secretsmanager:PutSecretValue
            - secretsmanager:GetSecretValue
          Resource:
            - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:DukanXInternalAPISecret-*'
            - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:dukanx/${self:provider.stage}/tenant/*/qr-secret*'
            - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:dukanx/${self:provider.stage}/tenant/*/razorpay*'

        # COST-OPT: OpenSearch IAM permissions removed (domain disabled)
        # Re-enable when OpenSearch Serverless is provisioned
        # - Effect: Allow
        #   Action:
        #     - es:ESHttpGet
        #     - es:ESHttpPut
        #     - es:ESHttpPost
        #     - es:ESHttpDelete
        #     - es:ESHttpHead
        #     - es:ESHttpPatch
        #   Resource:
        #     - !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/dukanx-search-${self:provider.stage}/*'

        # COST-OPT: Search DLQ IAM permissions removed (domain disabled)
        # - Effect: Allow
        #   Action:
        #     - sqs:SendMessage
        #     - sqs:ReceiveMessage
        #     - sqs:DeleteMessage
        #     - sqs:GetQueueAttributes
        #   Resource:
        #     - !GetAtt SearchDLQ.Arn
        #     - !GetAtt SearchDLQDeadLetter.Arn

# ── Package Configuration ────────────────────────────────────────────────
# PERF-7 FIX: Individual packaging — each Lambda gets only its dependencies.
# Reduces cold start by excluding irrelevant handlers from each function's bundle.
package:
  individually: true
  patterns:
    - 'dist/**'
    - 'node_modules/**'
    - '!src/**'
    - '!tests/**'
    - '!.env*'
    - '!tsconfig.json'
    - '!*.md'
    - '!*.log'
    - '!*.txt'

# ── Custom Configuration ────────────────────────────────────────────────
custom:
  splitStacks:
    nestedStackCount: 3
    perFunction: false
    perType: true
    perGroupFunction: false

# ============================================================================
# FUNCTIONS (Lambda Handlers)
# ============================================================================
functions:

  # ── Health Checks (No Auth Required) ──────────────────────────────────
  # LOW FIX: Health check endpoints for Flutter connectivity monitoring
  health:
    handler: dist/handlers/health.health
    events:
      - httpApi:
          path: /health
          method: GET
          authorizer:
            name: none
    description: System health status for Flutter connectivity checks

  healthReady:
    handler: dist/handlers/health.ready
    events:
      - httpApi:
          path: /health/ready
          method: GET
          authorizer:
            name: none
    description: Kubernetes-style readiness probe

  healthLive:
    handler: dist/handlers/health.live
    events:
      - httpApi:
          path: /health/live
          method: GET
          authorizer:
            name: none
    description: Kubernetes-style liveness probe

  # ── Hybrid Migration (Offline → Online) ──────────────────────────────────
  migrationIdentity:
    handler: dist/handlers/migration.migrateIdentity
    events:
      - httpApi:
          path: /migration/identity
          method: POST
    description: Provision Cognito identity record for migrating offline user

  migrationImport:
    handler: dist/handlers/migration.migrationImport
    timeout: 30
    memorySize: 512
    events:
      - httpApi:
          path: /migration/import
          method: POST
    description: Batch-write offline records into DynamoDB (max 25/request)

  migrationUpload:
    handler: dist/handlers/migration.migrationUpload
    events:
      - httpApi:
          path: /migration/upload
          method: POST
    description: Return S3 presigned PUT URL for offline blob upload

  migrationVerify:
    handler: dist/handlers/migration.migrationVerify
    timeout: 30
    events:
      - httpApi:
          path: /migration/verify
          method: POST
    description: Verify record counts match offline audit report

  migrationCutover:
    handler: dist/handlers/migration.migrationCutover
    events:
      - httpApi:
          path: /migration/cutover
          method: POST
    description: Convert offline license + mark migration complete (point of no return)

  migrationRollback:
    handler: dist/handlers/migration.migrationRollback
    timeout: 60
    memorySize: 512
    events:
      - httpApi:
          path: /migration/rollback
          method: POST
    description: Purge all cloud data from a failed migration run (safe rollback)

  # ── Authentication ──────────────────────────────────────────────────────
  # AUDIT FIX #11: Validate custom:role against UserRole enum before token generation
  cognitoPreTokenGen:
    handler: dist/handlers/cognito-triggers.preTokenGeneration
    events:
      - cognitoUserPool:
          pool: CognitoUserPool
          trigger: PreTokenGeneration
    description: Validate role attribute in JWT token claims

  authSignup:
    handler: dist/handlers/auth.signup
    events:
      - httpApi:
          path: /auth/signup
          method: POST
          authorizer:
            name: none
      - httpApi:
          path: /owner/register
          method: POST
          authorizer:
            name: none
    description: Register new tenant + owner account

  authLogin:
    handler: dist/handlers/auth.login
    events:
      - httpApi:
          path: /auth/login
          method: POST
          authorizer:
            name: none
    description: Authenticate user, return Cognito tokens

  authRefresh:
    handler: dist/handlers/auth.refresh
    events:
      - httpApi:
          path: /auth/refresh
          method: POST
          authorizer:
            name: none
    description: Refresh expired access tokens

  authMe:
    handler: dist/handlers/auth.me
    events:
      - httpApi:
          path: /auth/me
          method: GET
      - httpApi:
          path: /owner/profile
          method: GET
      - httpApi:
          path: /staff/profile
          method: GET
    description: Validate token and return user with permissions

  authMfaVerify:
    handler: dist/handlers/auth.mfaVerify
    events:
      - httpApi:
          path: /auth/mfa/verify
          method: POST
          authorizer:
            name: none
    description: Respond to MFA challenge with TOTP code

  authMfaSetup:
    handler: dist/handlers/auth.mfaSetup
    events:
      - httpApi:
          path: /auth/mfa/setup
          method: POST
          authorizer:
            name: none
    description: Get setup code for Authenticator App

  authMfaSetupConfirm:
    handler: dist/handlers/auth.mfaSetupConfirm
    events:
      - httpApi:
          path: /auth/mfa/confirm-setup
          method: POST
          authorizer:
            name: none
    description: Verify first-time MFA setup code

  # SECURITY FIX S-1: Logout — Revokes all refresh tokens via globalSignOut
  authLogout:
    handler: dist/handlers/auth.logout
    events:
      - httpApi:
          path: /auth/logout
          method: POST
    description: Logout and revoke all refresh tokens (globalSignOut)

  # AUDIT FIX #2: Forgot Password — Initiate Cognito password reset
  authForgotPassword:
    handler: dist/handlers/auth.forgotPassword
    events:
      - httpApi:
          path: /auth/forgot-password
          method: POST
          authorizer:
            name: none
    description: Initiate password reset via email verification code

  # AUDIT FIX #2: Confirm Reset Password — Verify code + set new password
  authConfirmResetPassword:
    handler: dist/handlers/auth.confirmResetPassword
    events:
      - httpApi:
          path: /auth/confirm-reset-password
          method: POST
          authorizer:
            name: none
    description: Confirm password reset with verification code

  # SECURITY FIX S-1: Change Password — Changes password and revokes all sessions
  authChangePassword:
    handler: dist/handlers/auth.changePassword
    events:
      - httpApi:
          path: /auth/change-password
          method: POST
    description: Change password and revoke all sessions

  # ── Dashboard V2 (Pixel-Perfect, Business-Type-Aware) ─────────────────
  getDashboardV2Summary:
    handler: dist/handlers/dashboard-v2.getDashboardV2Summary
    events:
      - httpApi:
          path: /dashboard/v2/summary
          method: GET
      - httpApi:
          path: /owner/dashboard
          method: GET
    description: Performance card KPIs (revenue, overdue, pending, collection period)

  getDashboardV2RevenueChart:
    handler: dist/handlers/dashboard-v2.getDashboardV2RevenueChart
    events:
      - httpApi:
          path: /dashboard/v2/revenue-chart
          method: GET
    description: 6-month billed vs collected revenue chart data

  getDashboardV2InvoiceDistribution:
    handler: dist/handlers/dashboard-v2.getDashboardV2InvoiceDistribution
    events:
      - httpApi:
          path: /dashboard/v2/invoice-distribution
          method: GET
    description: Paid/Pending/Overdue donut chart data

  getDashboardV2RecentInvoices:
    handler: dist/handlers/dashboard-v2.getDashboardV2RecentInvoices
    events:
      - httpApi:
          path: /dashboard/v2/recent-invoices
          method: GET
    description: Recent invoices table (last 10 days)

  getDashboardV2CashflowForecast:
    handler: dist/handlers/dashboard-v2.getDashboardV2CashflowForecast
    events:
      - httpApi:
          path: /dashboard/v2/cashflow-forecast
          method: GET
    description: Cash flow forecast (rolling 3 months)

  getDashboardV2NotificationsCount:
    handler: dist/handlers/dashboard-v2.getDashboardV2NotificationsCount
    events:
      - httpApi:
          path: /dashboard/v2/notifications-count
          method: GET
    description: Unread notification badge count

  getDashboardV2LicenseValidate:
    handler: dist/handlers/dashboard-v2.getDashboardV2LicenseValidate
    events:
      - httpApi:
          path: /dashboard/v2/license-validate
          method: GET
    description: License validation with allowed business types

  # ── Dashboard V1 endpoints removed — replaced by /dashboard/v2/* ───

  # ── Businesses (Multi-Business Switcher) ───────────────────────────────
  getMyBusinesses:
    handler: dist/handlers/businesses.getMyAccess
    events:
      - httpApi:
          path: /businesses/my-access
          method: GET
    description: Retrieves the list of businesses the accessible to the user

  # ── Inventory CRUD ─────────────────────────────────────────────────────
  getInventory:
    handler: dist/handlers/inventory.getItems
    events:
      - httpApi:
          path: /inventory
          method: GET

  createInventoryItem:
    handler: dist/handlers/inventory.createItem
    events:
      - httpApi:
          path: /inventory
          method: POST

  updateInventoryItem:
    handler: dist/handlers/inventory.updateItem
    events:
      - httpApi:
          path: /inventory/{id}
          method: PUT

  deleteInventoryItem:
    handler: dist/handlers/inventory.deleteItem
    events:
      - httpApi:
          path: /inventory/{id}
          method: DELETE

  # ── Smart Inventory Import ──────────────────────────────────────────────

  importProductFileInit:
    handler: dist/handlers/import-product-file.initImport
    events:
      - httpApi:
          path: /inventory/import/init
          method: POST
    memorySize: 256
    timeout: 30
    description: Initialize import job — idempotency check + presigned S3 URL

  importProductFileS3Trigger:
    handler: dist/handlers/import-product-file.processS3Upload
    events:
      - s3:
          bucket: !Ref TenantStorageBucket
          event: s3:ObjectCreated:*
          rules:
            - prefix: uploads/
          existing: true
    memorySize: 512
    timeout: 300
    description: S3 trigger — parse uploaded file and fan-out rows to SQS

  processImportRow:
    handler: dist/handlers/process-import-row.handler
    events:
      - sqs:
          arn: !GetAtt ImportRowQueue.Arn
          batchSize: 10
          functionResponseType: ReportBatchItemFailures
    memorySize: 256
    timeout: 60
    description: SQS consumer — product matching + DynamoDB write + WS progress push

  getImportJobStatus:
    handler: dist/handlers/get-import-job-status.getJobStatus
    events:
      - httpApi:
          path: /inventory/import/{jobId}
          method: GET
    memorySize: 128
    description: Get import job status, counts and error details

  listImportJobs:
    handler: dist/handlers/get-import-job-status.listJobs
    events:
      - httpApi:
          path: /inventory/import
          method: GET
    memorySize: 128
    description: List recent import jobs for tenant

  # ── Stock Adjustment (BUG-004 FIX — Wastage/Damage/Theft Tracking) ──
  adjustStock:
    handler: dist/handlers/inventory.adjustStock
    events:
      - httpApi:
          path: /inventory/{id}/adjust
          method: POST
    description: Categorized stock adjustment (wastage, damage, theft, correction, expiry)

  stockAdjustmentsReport:
    handler: dist/handlers/inventory.getStockAdjustments
    events:
      - httpApi:
          path: /reports/stock-adjustments
          method: GET
    description: Stock adjustment / wastage report for reconciliation

  # ── Grocery Expiry Alerts (FSSAI Compliance) ────────────────────────────
  groceryExpiryAlerts:
    handler: dist/handlers/grocery-expiry.getExpiryAlerts
    events:
      - httpApi:
          path: /inventory/expiry-alerts
          method: GET
    description: Grocery product expiry alerts grouped by urgency (expired/7d/30d)

  groceryBatchCreate:
    handler: dist/handlers/grocery-batches.createBatch
    events:
      - httpApi:
          path: /grocery/batches
          method: POST
    description: Create grocery batch lot with expiry and quantity

  groceryBatchList:
    handler: dist/handlers/grocery-batches.listBatches
    events:
      - httpApi:
          path: /grocery/batches
          method: GET
    description: List grocery batches for a product

  # ── Product Management (New: Pharmacy + Multi-Business) ────────────────
  getProducts:
    handler: dist/handlers/products.listProducts
    events:
      - httpApi:
          path: /products
          method: GET
    memorySize: 256
    description: List products with filters and pagination (pharmacy & other types)

  createProduct:
    handler: dist/handlers/products.createProduct
    events:
      - httpApi:
          path: /products
          method: POST
    memorySize: 256
    description: Create new product (with S3 image coordination)

  getProductById:
    handler: dist/handlers/products.getProductById
    events:
      - httpApi:
          path: /products/{id}
          method: GET
    memorySize: 256
    description: Get single product by ID with presigned image URLs

  updateProduct:
    handler: dist/handlers/products.updateProduct
    events:
      - httpApi:
          path: /products/{id}
          method: PUT
    memorySize: 256
    description: Update product details and metadata

  deleteProduct:
    handler: dist/handlers/products.deleteProduct
    events:
      - httpApi:
          path: /products/{id}
          method: DELETE
    memorySize: 256
    description: Delete product from catalog

  searchProductByBarcode:
    handler: dist/handlers/products.searchByBarcode
    events:
      - httpApi:
          path: /products/search/barcode
          method: GET
    memorySize: 256
    description: Search product by barcode (pharmacy use case)

  getTopSellingProducts:
    handler: dist/handlers/products.getTopSelling
    events:
      - httpApi:
          path: /products/top-selling
          method: GET
    memorySize: 256
    description: Get top-selling products for dashboard

  getLowStockProducts:
    handler: dist/handlers/products.getLowStock
    events:
      - httpApi:
          path: /products/low-stock
          method: GET
    memorySize: 256
    description: Get low-stock products for reorder alerts

  getProductImageUploadUrl:
    handler: dist/handlers/products.getImageUploadUrl
    events:
      - httpApi:
          path: /products/{id}/image-upload-url
          method: POST
    memorySize: 256
    description: Get presigned S3 URL for product image upload

  # ── Pharmacy Compliance APIs ─────────────────────────────────────────────
  pharmacyBatchIntake:
    handler: dist/handlers/pharmacy.batchIntake
    events:
      - httpApi:
          path: /pharmacy/batch-intake
          method: POST
    description: Record medicine batch intake (GRN/purchase)

  pharmacyNarcoticCreate:
    handler: dist/handlers/pharmacy.createNarcoticEntry
    events:
      - httpApi:
