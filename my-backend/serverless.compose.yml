# ============================================================================
# DukanX — Serverless Compose (Multi-Stack Orchestration)
# ============================================================================
# Replaces the monolithic 270KB serverless.yml with per-module stacks.
# Each module deploys independently. Core infrastructure is shared.
#
# Deploy all:    sls compose deploy
# Deploy one:    sls compose deploy --stack dukanx-grocery
# Remove one:    sls compose remove --stack dukanx-grocery
#
# Stack dependency order is enforced by `dependsOn`.
# ============================================================================

stages:
  default:
    params:
      region: ap-south-1

services:
  # ── 1. Core Infrastructure ─────────────────────────────────────────────────
  dukanx-core:
    path: .
    config: serverless.yml
    params:
      stage: ${sls:stage}

  # ── 2. Shared Services ────────────────────────────────────────────────────
  dukanx-shared:
    path: .
    config: serverless.shared.yml
    dependsOn: dukanx-core
    params:
      stage: ${sls:stage}

  # ── 3. Business Modules (independent, parallel-deployable) ────────────────

  dukanx-grocery:
    path: .
    config: serverless.modules.yml
    params:
      stage: ${sls:stage}
      module: grocery
    dependsOn: dukanx-shared

  dukanx-pharmacy:
    path: .
    config: serverless.modules.yml
    params:
      stage: ${sls:stage}
      module: pharmacy
    dependsOn: dukanx-shared

