# IAM PERMISSIONS (Add to provider.iam.role.statements)
# ============================================================================

# These are already covered by existing DynamoDB permissions if you have:
# - dynamodb:Query
# - dynamodb:GetItem
# - dynamodb:PutItem
# - dynamodb:UpdateItem
# - dynamodb:DeleteItem

# No additional IAM permissions needed for these functions.
