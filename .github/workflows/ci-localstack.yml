# =============================================================================
# GitHub Actions — CI/CD with LocalStack Integration Tests
# =============================================================================

name: CI — Backend + LocalStack

on:
  push:
    branches: [main, develop]
    paths:
      - 'lambda/**'
      - 'local-cloud/**'
      - 'my-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'lambda/**'
      - 'local-cloud/**'

env:
  AWS_DEFAULT_REGION: ap-south-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

jobs:
  # ─── Unit Tests ──────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: lambda/package-lock.json

      - name: Install Lambda dependencies
        run: cd lambda && npm ci

      - name: Run Lambda unit tests
        run: cd lambda && npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: lambda-coverage
          path: lambda/coverage/

  # ─── Integration Tests with LocalStack ───────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      localstack:
        image: localstack/localstack:3.8
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb,s3,sqs,sns,secretsmanager,ssm,events
          PERSISTENCE: 0
          LS_LOG: warn
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd lambda && npm ci

      - name: Wait for LocalStack
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:4566/_localstack/health | grep -q running; do sleep 2; done'

      - name: Create AWS resources
        run: bash local-cloud/init/01-create-resources.sh

      - name: Seed test data
        run: bash local-cloud/init/02-seed-data.sh

      - name: Run integration tests
        run: node local-cloud/tests/integration.mjs

      - name: Run smoke tests
        run: node local-cloud/scripts/smoke-test.mjs

  # ─── Terraform Validation ────────────────────────────────────────────
  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: Terraform Init
        run: cd local-cloud/terraform && terraform init -backend=false

      - name: Terraform Validate
        run: cd local-cloud/terraform && terraform validate

      - name: Terraform Format Check
        run: cd local-cloud/terraform && terraform fmt -check -recursive
