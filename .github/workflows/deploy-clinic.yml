name: Deploy Clinic Serverless Backend

on:
  push:
    branches:
      - main
    paths:
      - 'clinic-serverless-backend/**'

defaults:
  run:
    working-directory: clinic-serverless-backend

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: clinic-serverless-backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Type Checks
        run: npx tsc --noEmit

      - name: Run Jest Audits (Integer Paise Assurance)
        run: npm run test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy via Serverless Framework
        run: npx serverless deploy --stage prod
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
